<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHW Screening Result</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0f2444; --navy-mid: #1a3a6b; --accent: #2563eb; --accent-hover: #1d4ed8;
  --ok: #059669; --ok-bg: #ecfdf5; --ok-text: #065f46;
  --err: #dc2626; --err-bg: #fef2f2; --err-text: #991b1b;
  --surface: #ffffff; --bg: #f1f5fb; --line: #dde3ee; --muted: #64748b; --ink: #1e2a3a;
  --radius: 16px; --shadow: 0 1px 3px rgba(15,36,68,.07), 0 8px 30px rgba(15,36,68,.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; -webkit-font-smoothing: antialiased; }
.container { width: 100%; max-width: 460px; }
.card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 36px 32px; box-shadow: var(--shadow); text-align: center; }
.logo { width: 48px; height: 48px; background: var(--navy); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
.logo svg { width: 24px; height: 24px; }
h1 { font-size: 19px; font-weight: 600; letter-spacing: -.01em; margin-bottom: 6px; }
.subtitle { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 28px; }
.field { text-align: left; margin-bottom: 16px; }
label { display: block; font-size: 12.5px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
input { width: 100%; height: 48px; padding: 0 14px; border: 1.5px solid var(--line); border-radius: 10px; font-family: inherit; font-size: 15px; color: var(--ink); background: #fff; transition: border-color .15s, box-shadow .15s; }
input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
input:disabled { background: #f1f5f9; color: var(--muted); cursor: not-allowed; }
.hint { font-size: 11.5px; color: var(--muted); margin-top: 7px; line-height: 1.5; }
.btn { width: 100%; height: 50px; margin-top: 4px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background .15s, transform .1s, box-shadow .15s; box-shadow: 0 2px 8px rgba(37,99,235,.25); text-decoration: none; }
.btn:hover { background: var(--accent-hover); box-shadow: 0 4px 14px rgba(37,99,235,.35); }
.btn:active { transform: scale(.985); }
.btn:disabled { background: #94a3b8; box-shadow: none; cursor: not-allowed; }
.btn svg { width: 18px; height: 18px; }
.btn.ok { background: var(--ok); box-shadow: 0 2px 8px rgba(5,150,105,.25); }
.btn.ok:hover { background: #047857; box-shadow: 0 4px 14px rgba(5,150,105,.35); }
.spin { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pop { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: scale(1); } }
.result { animation: pop .3s ease; }
.result-icon { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; }
.result-icon.pass { background: var(--ok-bg); }
.result-icon.fail { background: var(--err-bg); }
.result-icon svg { width: 36px; height: 36px; }
.result-icon.pass svg { color: var(--ok); }
.result-icon.fail svg { color: var(--err); }
.score-display { font-family: 'DM Mono', monospace; font-size: 40px; font-weight: 500; letter-spacing: -.02em; margin: 4px 0; }
.score-display.pass { color: var(--ok-text); }
.score-display.fail { color: var(--err-text); }
.score-label { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
.result-msg { font-size: 14px; color: var(--muted); line-height: 1.6; margin: 14px 0 24px; }
.result-name { font-weight: 600; color: var(--ink); }
.error-text { color: var(--err); font-size: 13px; margin-top: 12px; min-height: 18px; }
.attempt-flag { margin: 0 0 16px; padding: 10px 12px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; color: #92400e; font-size: 13px; line-height: 1.5; text-align: left; }
.hidden { display: none; }
.footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 20px; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div id="lookup-view">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      </div>
      <h1>Check your screening result</h1>
      <p class="subtitle">Enter your 11-digit NIN to view your result.</p>
      <div class="field">
        <label>NIN (National Identification Number)</label>
        <input type="text" id="nin-input" inputmode="numeric" maxlength="11" placeholder="11-digit NIN" autocomplete="off">
        <div class="hint">Tip: this is the same NIN you used to enter the screening hall.</div>
      </div>
      <button class="btn" id="check-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Check result
      </button>
      <div class="error-text" id="error-text"></div>
    </div>
    <div id="result-view" class="result hidden">
      <div class="result-icon" id="result-icon"></div>
      <div class="score-label">Your score</div>
      <div class="score-display" id="score-display"></div>
      <div class="result-msg" id="result-msg"></div>
      <div id="attempt-flag" class="attempt-flag hidden"></div>
      <div id="action-area"></div>
    </div>
  </div>
  <div class="footer">ORS &amp; Zinc Programme</div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwJjyRsB_uQLZIl2R3_GAvW4FTsiAGCnmVKT8sy1KClwwZ4Lf9NrHQ-8FQ0ezJkeDMF/exec";

const ninInput    = document.getElementById("nin-input");
const checkBtn    = document.getElementById("check-btn");
const errorText   = document.getElementById("error-text");
const lookupView  = document.getElementById("lookup-view");
const resultView  = document.getElementById("result-view");

checkBtn.addEventListener("click", checkResult);
ninInput.addEventListener("keydown", function(e){ if (e.key === "Enter") checkResult(); });
ninInput.addEventListener("input", function(){ ninInput.value = ninInput.value.replace(/\D/g, "").slice(0, 11); });

const urlNin = new URLSearchParams(window.location.search).get("nin");
if (urlNin) ninInput.value = decodeURIComponent(urlNin).replace(/\D/g, "").slice(0, 11);

// Retry with exponential backoff + jitter — absorbs event-day bursts.
async function fetchJSONWithRetry(url, onRetry) {
  const maxRetries = 4;
  let lastErr;
  for (let attempt = 0; attempt <= maxRetries; attempt++) {
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error("HTTP " + res.status);
      return await res.json();
    } catch (e) {
      lastErr = e;
      if (attempt === maxRetries) break;
      if (onRetry) onRetry(attempt + 1);
      const wait = Math.min(800 * Math.pow(2, attempt), 8000) + Math.floor(Math.random() * 700);
      await new Promise(r => setTimeout(r, wait));
    }
  }
  throw lastErr;
}

async function checkResult() {
  const nin = ninInput.value.trim();
  errorText.textContent = "";
  if (!/^[0-9]{11}$/.test(nin)) {
    errorText.textContent = "Please enter your full 11-digit NIN.";
    return;
  }
  checkBtn.disabled = true;
  ninInput.disabled = true;
  checkBtn.innerHTML = '<div class="spin"></div> Checking…';

  // Small random pre-delay: pre-spreads a synchronized "everyone check now" burst.
  await new Promise(r => setTimeout(r, Math.floor(Math.random() * 1500)));

  try {
    const data = await fetchJSONWithRetry(
      APPS_SCRIPT_URL + "?action=checknin&nin=" + encodeURIComponent(nin),
      function(n){ checkBtn.innerHTML = '<div class="spin"></div> Server busy — retrying… (' + n + ')'; }
    );
    if (!data.found) {
      errorText.textContent = "No submission found for this NIN. Please check and try again.";
      resetBtn();
      return;
    }
    showResult(data);
  } catch (e) {
    errorText.textContent = "Could not reach the server after several tries. Check your connection and try again.";
    resetBtn();
  }
}

function resetBtn() {
  checkBtn.disabled = false;
  ninInput.disabled = false;
  checkBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> Check result';
}

function showResult(data) {
  lookupView.classList.add("hidden");
  resultView.classList.remove("hidden");
  const icon   = document.getElementById("result-icon");
  const score  = document.getElementById("score-display");
  const msg    = document.getElementById("result-msg");
  const action = document.getElementById("action-area");
  score.textContent = data.score + " / " + (data.totalMarks || data.passScore);

  const flag = document.getElementById("attempt-flag");
  if (data.multipleAttempts) {
    flag.textContent = "Note: more than one attempt was recorded for this NIN. Your first attempt is the one that counts — please see your supervisor if you have a question.";
    flag.classList.remove("hidden");
  } else {
    flag.classList.add("hidden");
  }
  // Identity line: name + NIN, so the candidate sees exactly whose result this is.
  var nameHtml = data.name ? '<span class="result-name">' + escHtml(data.name) + '</span>' : '';
  var ninHtml  = data.nin  ? '<span class="result-name">NIN ' + escHtml(data.nin) + '</span>' : '';
  var who = nameHtml;
  if (ninHtml) who += (who ? ', ' : '') + ninHtml;

  if (data.passed) {
    icon.className = "result-icon pass";
    icon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
    score.className = "score-display pass";
    msg.innerHTML = 'Congratulations ' + who + ' — you passed the screening. Click below to validate your bank account details.';
    const link = data.validatorUrl + "?ref=" + encodeURIComponent(data.ref) + "&name=" + encodeURIComponent(data.name || "");
    action.innerHTML = '<a class="btn ok" href="' + link + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg> Validate my bank account</a>';
  } else {
    icon.className = "result-icon fail";
    icon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
    score.className = "score-display fail";
    msg.innerHTML = 'Thank you ' + who + '. Unfortunately you did not meet the minimum score of ' + data.passScore + ' required at this time. Please contact your supervisor for guidance.';
    action.innerHTML = "";
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
</body>
</html>
